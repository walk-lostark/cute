<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>단체 스크린샷</title>
<style>
body { text-align:center; font-family:sans-serif; }
img { width:300px; transition:0.3s; }
button {
  margin-top:10px;
  padding:10px 16px;
  border:none;
  border-radius:20px;
  background:#ff69b4;
  color:white;
  cursor:pointer;
}
</style>
</head>
<body>

<img id="photo" src="img1.jpg">

<br>
<button onclick="changePhoto()">다른 사진 보기♥</button>

<script>
const images = ["img1.jpg","img2.jpg","img3.jpg","img4.jpg"];

function changePhoto(){
  const current = document.getElementById("photo").src;
  let next;
  do {
    next = images[Math.floor(Math.random()*images.length)];
  } while(current.includes(next));
  document.getElementById("photo").src = next + "?t=" + new Date().getTime();
}
</script>

</body>
</html>
